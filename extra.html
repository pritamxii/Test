<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
            display: flex;
            justify-content: center;
        }
        .calc-wrap {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 320px;
            margin: 10px;
        }
        #display {
            width: 100%;
            height: 60px;
            font-size: 24px;
            text-align: right;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            background: #f8f9fa;
            color: #2d3436;
            outline: none;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #f0ede8;
            color: #2d3436;
        }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:active { transform: scale(0.95); }
        .op { background: #9b8ec4; color: white; } /* Lavender */
        .eq { background: #7c9e87; color: white; grid-column: span 2; } /* Sage */
        .ac { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="calc-wrap">
    <input type="text" id="display" readonly placeholder="0">
    <div class="btn-grid">
        <button class="ac" onclick="clearDisplay()">AC</button>
        <button class="op" onclick="del()">DEL</button>
        <button class="op" onclick="addToDisplay('%')">%</button>
        <button class="op" onclick="addToDisplay('/')">/</button>
        
        <button onclick="addToDisplay('7')">7</button>
        <button onclick="addToDisplay('8')">8</button>
        <button onclick="addToDisplay('9')">9</button>
        <button class="op" onclick="addToDisplay('*')">×</button>
        
        <button onclick="addToDisplay('4')">4</button>
        <button onclick="addToDisplay('5')">5</button>
        <button onclick="addToDisplay('6')">6</button>
        <button class="op" onclick="addToDisplay('-')">-</button>
        
        <button onclick="addToDisplay('1')">1</button>
        <button onclick="addToDisplay('2')">2</button>
        <button onclick="addToDisplay('3')">3</button>
        <button class="op" onclick="addToDisplay('+')">+</button>
        
        <button onclick="addToDisplay('0')">0</button>
        <button onclick="addToDisplay('.')">.</button>
        <button class="eq" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function addToDisplay(input) {
        if (display.value === "Error") display.value = "";
        display.value += input;
    }

    function clearDisplay() {
        display.value = "";
    }

    function del() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            // eval ব্যবহার করা হয়েছে সহজ হিসাবের জন্য
            display.value = eval(display.value);
        } catch (error) {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
