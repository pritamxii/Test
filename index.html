<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Task Master 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Bangers&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dbz-orange: #FF8A00;
            --dbz-orange-dark: #E67E22;
            --dbz-blue: #0055A4;
            --dbz-yellow: #FDBB30;
            --dbz-red: #ED1C24;
            --bg: #1A1A1A;
            --card-bg: #262626;
            --text: #FFFFFF;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dbz-orange);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .splash-logo {
            text-align: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px gold); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px gold); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px gold); }
        }

        .splash-text {
            font-family: 'Bangers', cursive;
            font-size: 40px;
            color: white;
            text-shadow: 3px 3px 0px var(--dbz-blue);
            letter-spacing: 2px;
        }

        .progress-container {
            width: 200px;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-top: 20px;
            border: 2px solid gold;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--dbz-yellow);
            transition: width 1.5s ease-in-out;
        }

        .fade-out { opacity: 0; pointer-events: none; }

        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 10px; 
            color: var(--text);
            background-image: radial-gradient(rgba(255, 138, 0, 0.05) 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* --- DBZ CARDS --- */
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 15px; 
            border-left: 5px solid var(--dbz-orange);
            box-shadow: 0 4px 0px var(--dbz-blue);
        }

        .achievement-container { 
            background: linear-gradient(135deg, var(--dbz-orange) 0%, var(--dbz-red) 100%); 
            border-radius: 15px; 
            padding: 15px; 
            border: 3px solid var(--dbz-yellow);
            position: relative;
            overflow: hidden;
        }

        .ach-title { 
            font-family: 'Bangers', cursive; 
            font-size: 20px; 
            color: white; 
            text-shadow: 2px 2px var(--dbz-blue);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ach-section { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; text-align: center; }
        .ach-label { font-size: 10px; font-weight: 900; color: var(--dbz-yellow); text-transform: uppercase; }
        .ach-value { font-family: 'Luckiest Guy', cursive; font-size: 24px; color: white; margin: 5px 0; }
        
        .medal-badge { 
            font-size: 10px; 
            font-weight: bold; 
            padding: 4px 8px; 
            border-radius: 4px; 
            background: #444; 
            color: #888; 
        }
        .medal-badge.active { background: var(--dbz-yellow); color: black; border: 1px solid white; box-shadow: 0 0 10px var(--dbz-yellow); }

        /* --- CALENDAR --- */
        .calendar-nav { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; }
        .day-pill { 
            min-width: 50px; padding: 10px 5px; background: #333; border-radius: 8px; border: 2px solid transparent;
            cursor: pointer; text-align: center; flex-shrink: 0; transition: 0.2s;
        }
        .day-pill.is-today { border-color: var(--dbz-red); }
        .day-pill.active { background: var(--dbz-blue) !important; border-color: var(--dbz-yellow); transform: scale(1.05); }
        .day-pill .date-num { font-weight: 900; font-size: 18px; display: block; }

        /* --- TASK LIST --- */
        .habit-container { border-radius: 12px; overflow: hidden; background: var(--card-bg); border: 2px solid #444; }
        .habit-header { 
            background: var(--dbz-blue); 
            padding: 12px; 
            font-family: 'Bangers', cursive; 
            font-size: 18px; 
            color: white; 
            letter-spacing: 1px;
        }
        
        .habit-row { 
            display: flex; align-items: center; border-bottom: 1px solid #333; 
            min-height: 60px; transition: 0.2s; 
        }
        .habit-row:hover { background: #2d2d2d; }
        
        .habit-label { flex: 1; padding: 10px 15px; font-weight: 900; display: flex; flex-direction: column; }
        .task-time { font-size: 10px; color: var(--dbz-yellow); margin-top: 2px; }

        .habit-check-area { width: 65px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); }
        .custom-checkbox { 
            width: 30px; height: 30px; border: 3px solid var(--dbz-orange); border-radius: 50%; 
            background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .custom-checkbox.checked { background: var(--dbz-orange); border-color: var(--dbz-yellow); }
        .custom-checkbox.checked::after { content: '★'; color: white; font-size: 18px; }

        .delete-btn { color: var(--dbz-red); font-weight: bold; font-size: 20px; cursor: pointer; margin-left: 10px; }

        /* --- INPUTS --- */
        .input-group { display: flex; gap: 8px; }
        .input-group input { 
            flex: 1; background: #333; border: 2px solid #444; border-radius: 8px; 
            padding: 12px; color: white; font-weight: bold; outline: none;
        }
        .input-group input:focus { border-color: var(--dbz-orange); }
        .input-group button { 
            background: var(--dbz-orange); color: white; border: none; padding: 0 20px; 
            border-radius: 8px; font-family: 'Bangers', cursive; font-size: 16px; cursor: pointer;
        }

        #dayNote { 
            background: #333; color: white; border: 1px solid #444; border-radius: 8px; 
            padding: 10px; font-family: inherit; width: 100%; box-sizing: border-box;
        }

        /* --- BUTTONS & MODALS --- */
        .history-toggle-btn { 
            width: 100%; padding: 15px; border-radius: 8px; border: 2px solid var(--dbz-blue);
            background: var(--card-bg); color: var(--dbz-blue); font-family: 'Bangers', cursive; 
            font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .history-toggle-btn.active { background: var(--dbz-blue); color: white; }

        .modal-content { 
            background: var(--card-bg); border: 4px solid var(--dbz-orange); 
            border-radius: 20px; color: white; padding: 25px;
        }
        .modal-input { background: #333; color: white; border: 2px solid var(--dbz-blue); border-radius: 8px; }
        
        .btn-confirm { background: var(--dbz-blue) !important; font-family: 'Bangers', cursive; }
        .btn-cancel { background: #444 !important; color: white !important; font-family: 'Bangers', cursive; }

        .dev-sig { text-align: center; font-family: 'Luckiest Guy', cursive; color: var(--dbz-orange); opacity: 0.7; margin: 20px 0; letter-spacing: 2px; }

        select { 
            background: var(--dbz-blue); color: white; border: 2px solid var(--dbz-yellow); 
            border-radius: 5px; font-weight: bold; padding: 2px 5px; 
        }

        .history-container { background: #222; }
        .history-perc { color: var(--dbz-yellow); font-family: 'Luckiest Guy', cursive; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="#FDBB30">
            <path d="M12,2L15.09,8.26L22,9.27L17,14.14L18.18,21.02L12,17.77L5.82,21.02L7,14.14L2,9.27L8.91,8.26L12,2Z" />
        </svg>
        <div class="splash-text">Z-TASK MASTER</div>
        <div style="color:white; font-size:10px; font-weight:bold; margin-top:5px;">POWER LEVELING...</div>
    </div>
    <div class="progress-container">
        <div class="progress-bar" id="load-bar"></div>
    </div>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 5px;">
        <h3 style="margin:0; font-family:'Bangers', cursive; font-size: 24px; color:var(--dbz-orange); text-shadow:1px 1px black;">SAGA TRACKER</h3>
        <div style="display: flex; gap: 5px;">
            <select id="monthSelect" onchange="initCalendar()">
                <option>January</option><option>February</option><option>March</option>
                <option>April</option><option>May</option><option>June</option>
                <option>July</option><option>August</option><option>September</option>
                <option>October</option><option>November</option><option>December</option>
            </select>
            <select id="yearSelect" onchange="initCalendar()"></select>
        </div>
    </div>

    <div class="achievement-container">
        <div class="ach-title">★ POWER LEVEL (RANK) ★</div>
        <div class="ach-grid">
            <div class="ach-section">
                <div class="ach-label">Daily Power</div>
                <div id="dailyPercentText" class="ach-value">0%</div>
                <div id="dailyMedal" class="medal-badge">TRAINING</div>
            </div>
            <div class="ach-section">
                <div class="ach-label">Monthly Saga</div>
                <div id="monthlyPercentText" class="ach-value">0%</div>
                <div id="monthlyMedal" class="medal-badge">ROOKIE</div>
            </div>
        </div>
    </div>

    <div class="calendar-nav" id="datePicker"></div>

    <div class="card">
        <div style="text-align:left; font-weight:bold; color:var(--dbz-yellow); font-size:10px; margin-bottom:8px;">TRAINING PROGRESS (CHART)</div>
        <div class="chart-container">
            <canvas id="habitChart"></canvas>
        </div>
    </div>

    <div class="habit-container">
        <div class="habit-header" id="listTitle">CURRENT MISSIONS</div>
        <div id="habitList"></div>
    </div>

    <div class="input-group">
        <input type="text" id="habitInput" placeholder="Enter new mission...">
        <button onclick="addHabit()">TRAIN</button>
    </div>

    <div class="card">
        <div style="font-weight:900; color:var(--dbz-orange); font-size:10px; margin-bottom:5px;">SAIYAN'S LOG (JOURNAL)</div>
        <textarea id="dayNote" style="min-height: 60px;" placeholder="What happened in today's battle?" oninput="saveNote()"></textarea>
    </div>

    <div class="history-container" id="historyBox" style="border-radius:12px; border:2px solid #444; padding:0 15px;">
        <div class="history-title" id="historyHeader" style="padding-top:15px; font-weight:900; color:var(--dbz-yellow); font-size:12px;">SAGA PERFORMANCE</div>
        <div id="historyList"></div>
    </div>

    <button class="history-toggle-btn" id="toggleBtn" onclick="toggleHistory()">📊 VIEW COMBAT STATS</button>

    <div style="display:flex; gap:8px; justify-content:center; margin-top: 10px;">
        <button onclick="openExport()" style="padding:8px 15px; border-radius:8px; border:1px solid #444; background:#333; color:white; font-size:10px; font-weight:900;">SAVE CAPSULE</button>
        <button onclick="openRestore()" style="padding:8px 15px; border-radius:8px; border:1px solid #444; background:#333; color:white; font-size:10px; font-weight:900;">LOAD CAPSULE</button>
    </div>

    <div class="dev-sig">CREATED BY PRITAM • Z-WARRIOR</div>
</div>

<div id="dataModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
    <div class="modal-content" style="width:80%; max-width:400px; text-align:center;">
        <h4 id="modalTitle" style="font-family:'Bangers', cursive; font-size:24px;">CAPSULE DATA</h4>
        <textarea id="dataArea" style="width:100%; height:100px; background:#111; color:var(--dbz-yellow); border:1px solid #444; padding:10px; border-radius:8px;"></textarea>
        <button onclick="processData()" id="modalBtn" style="width:100%; padding:15px; background:var(--dbz-orange); color:white; border:none; border-radius:8px; font-family:'Bangers', cursive; font-size:18px; margin-top:15px;">ACTION</button>
        <p onclick="closeModal()" style="margin-top:15px; cursor:pointer; color:#AAA; font-size:12px;">CLOSE</p>
    </div>
</div>

<div id="editModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
    <div class="modal-content" style="width:80%; max-width:350px;">
        <h4 style="font-family:'Bangers', cursive; font-size:24px; text-align:center;">MODIFY MISSION</h4>
        <input type="text" id="editInput" class="modal-input" style="width:100%; padding:12px; box-sizing:border-box; margin:15px 0; text-align:center; font-size:18px;">
        <div style="display:flex; gap:10px;">
            <button class="btn-cancel" onclick="closeEditModal()" style="flex:1; padding:12px; border:none; border-radius:8px;">BACK</button>
            <button class="btn-confirm" id="saveEditBtn" style="flex:1; padding:12px; border:none; border-radius:8px; color:white;">UPDATE</button>
        </div>
    </div>
</div>

<script>
    // CORE LOGIC REMAINS IDENTICAL TO ORIGINAL TO PRESERVE FEATURES
    let allData = JSON.parse(localStorage.getItem('HabitPro_Daily_Mode')) || {};
    let notesData = JSON.parse(localStorage.getItem('HabitPro_Notes_Daily')) || {};
    
    const todayObj = new Date();
    const realToday = todayObj.getDate();
    const realMonth = todayObj.getMonth();
    const realYear = todayObj.getFullYear();
    
    let selectedDay = realToday;
    let selectedMonth = "";
    let selectedYear = realYear;
    let currentEditIdx = null;
    
    const monthsArr = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
    let myChart;

    window.onload = function() {
        const yearSelect = document.getElementById('yearSelect');
        for(let y = realYear - 2; y <= realYear + 5; y++) {
            let opt = document.createElement('option');
            opt.value = y;
            opt.innerHTML = y;
            if(y === realYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        document.getElementById('load-bar').style.width = '100%';
        selectedMonth = monthsArr[realMonth];
        document.getElementById('monthSelect').value = selectedMonth;
        initChart();
        initCalendar();

        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('fade-out');
        }, 1800);
    };

    function initCalendar() {
        selectedMonth = document.getElementById('monthSelect').value;
        selectedYear = parseInt(document.getElementById('yearSelect').value);
        const picker = document.getElementById('datePicker');
        picker.innerHTML = '';
        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        
        for (let i = 1; i <= daysInMonth; i++) {
            const dateObj = new Date(selectedYear, monthsArr.indexOf(selectedMonth), i);
            const isToday = (i === realToday && selectedMonth === monthsArr[realMonth] && selectedYear === realYear);
            const isPast = (dateObj < new Date(realYear, realMonth, realToday)); 
            
            const pill = document.createElement('div');
            pill.className = `day-pill ${i === selectedDay ? 'active' : ''} ${isToday ? 'is-today' : ''} ${isPast && !isToday ? 'is-past' : ''}`;
            pill.innerHTML = `<span style="font-size:9px; color:#888; font-weight:900;">${dayNames[dateObj.getDay()]}</span><span class="date-num" style="color:white;">${i}</span>`;
            pill.onclick = () => { selectedDay = i; updateUI(); };
            picker.appendChild(pill);
            if(i === selectedDay) pill.scrollIntoView({ inline: 'center', behavior: 'smooth' });
        }
        updateUI();
    }

    function toggleHistory() {
        const box = document.getElementById('historyBox');
        const btn = document.getElementById('toggleBtn');
        box.style.maxHeight = box.style.maxHeight === '1000px' ? '0' : '1000px';
        box.style.overflow = 'hidden';
        btn.classList.toggle('active');
        if(box.style.maxHeight === '1000px') {
            btn.innerText = "✖ CLOSE COMBAT STATS";
        } else {
            btn.innerText = "📊 VIEW COMBAT STATS";
        }
    }

    function calculateAchievements() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = allData[key] || [];
        const doneCount = habits.filter(h => h.done).length;
        const dailyPercent = habits.length ? Math.round((doneCount / habits.length) * 100) : 0;
        document.getElementById('dailyPercentText').innerText = dailyPercent + "%";
        
        let dailyMedal = "TRAINING";
        if(dailyPercent >= 90) dailyMedal = "SUPER SAIYAN";
        else if(dailyPercent >= 75) dailyMedal = "WARRIOR";
        else if(dailyPercent >= 50) dailyMedal = "FIGHTER";
        
        const dBadge = document.getElementById('dailyMedal');
        dBadge.innerText = dailyMedal;
        dBadge.className = dailyPercent >= 50 ? 'medal-badge active' : 'medal-badge';

        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        let totalPercent = 0;
        let trackedDays = 0;
        for(let i=1; i<=daysInMonth; i++) {
            const mKey = `${selectedYear}_${selectedMonth}_${i}`;
            const mHabits = allData[mKey] || [];
            if(mHabits.length > 0) {
                const mDone = mHabits.filter(h => h.done).length;
                totalPercent += (mDone / mHabits.length) * 100;
                trackedDays++;
            }
        }
        const avgMonthly = trackedDays ? Math.round(totalPercent / trackedDays) : 0;
        document.getElementById('monthlyPercentText').innerText = avgMonthly + "%";
        
        let monthlyMedal = "ROOKIE";
        if(avgMonthly >= 90) monthlyMedal = "ULTRA INSTINCT";
        else if(avgMonthly >= 80) monthlyMedal = "ELITE";
        else if(avgMonthly >= 60) monthlyMedal = "COMMANDER";

        const mBadge = document.getElementById('monthlyMedal');
        mBadge.innerText = monthlyMedal;
        mBadge.className = avgMonthly >= 60 ? 'medal-badge active' : 'medal-badge';
    }

    function renderPerformanceHistory() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';
        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        let taskStats = {}; 

        for(let i = 1; i <= daysInMonth; i++) {
            const key = `${selectedYear}_${selectedMonth}_${i}`;
            const dayTasks = allData[key] || [];
            dayTasks.forEach(task => {
                const taskName = task.text.trim();
                if(!taskStats[taskName]) taskStats[taskName] = { total: 0, done: 0 };
                taskStats[taskName].total++;
                if(task.done) taskStats[taskName].done++;
            });
        }

        Object.keys(taskStats).sort().forEach(taskName => {
            const stats = taskStats[taskName];
            const accuracy = Math.round((stats.done / stats.total) * 100);
            const div = document.createElement('div');
            div.style.display = 'flex'; div.style.justifyContent = 'space-between'; div.style.padding = '10px 0'; div.style.borderBottom = '1px solid #333';
            div.innerHTML = `<div style="font-weight:bold;">${taskName}</div><div style="text-align:right"><span class="history-perc">${accuracy}%</span><br><span style="font-size:8px; color:#666;">LVL ${stats.done}/${stats.total}</span></div>`;
            historyList.appendChild(div);
        });
    }

    function updateUI() {
        document.querySelectorAll('.day-pill').forEach((p, idx) => {
            p.classList.toggle('active', (idx + 1) === selectedDay);
        });
        document.getElementById('listTitle').innerText = `SAGA: ${selectedDay} ${selectedMonth.toUpperCase()}`;
        renderHabits();
        loadNote();
        updateChart();
        calculateAchievements();
        renderPerformanceHistory();
        localStorage.setItem('HabitPro_Daily_Mode', JSON.stringify(allData));
    }

    function renderHabits() {
        const list = document.getElementById('habitList');
        list.innerHTML = '';
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = allData[key] || [];
        habits.forEach((h, idx) => {
            const row = document.createElement('div');
            row.className = `habit-row`;
            row.ondblclick = () => openEditModal(idx);
            row.innerHTML = `
                <div class="habit-label">
                    <span style="${h.done ? 'text-decoration:line-through; opacity:0.5;' : ''}">${h.text}</span>
                    <span class="task-time">BATTLE TIME: ${h.time || '--:--'}</span>
                </div>
                <span class="delete-btn" onclick="event.stopPropagation(); deleteHabit(${idx})" style="padding-right:15px">×</span>
                <div class="habit-check-area">
                    <div class="custom-checkbox ${h.done ? 'checked' : ''}" onclick="event.stopPropagation(); toggleHabit(${idx})"></div>
                </div>`;
            list.appendChild(row);
        });
    }

    function openEditModal(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        currentEditIdx = idx;
        document.getElementById('editInput').value = allData[key][idx].text;
        document.getElementById('editModal').style.display = 'flex';
        document.getElementById('saveEditBtn').onclick = () => {
            const newText = document.getElementById('editInput').value;
            if(newText.trim()) {
                allData[key][currentEditIdx].text = newText.trim();
                updateUI(); closeEditModal();
            }
        };
    }
    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    function addHabit() {
        const input = document.getElementById('habitInput');
        if(!input.value.trim()) return;
        const now = new Date();
        const timeStr = now.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        if(!allData[key]) allData[key] = [];
        allData[key].push({ text: input.value, done: false, time: timeStr });
        input.value = ''; updateUI();
    }

    function toggleHabit(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        allData[key][idx].done = !allData[key][idx].done;
        if(allData[key][idx].done) {
            confetti({ particleCount: 50, spread: 70, origin: { y: 0.8 }, colors: ['#FF8A00', '#FDBB30', '#FFFFFF'] });
        }
        updateUI();
    }

    function deleteHabit(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        allData[key].splice(idx, 1);
        updateUI();
    }

    function saveNote() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        notesData[key] = document.getElementById('dayNote').value;
        localStorage.setItem('HabitPro_Notes_Daily', JSON.stringify(notesData));
    }

    function loadNote() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        document.getElementById('dayNote').value = notesData[key] || '';
    }

    function initChart() {
        const ctx = document.getElementById('habitChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ 
                data: [], borderColor: '#FF8A00', backgroundColor: 'rgba(255, 138, 0, 0.2)', fill: true, tension: 0.4, pointRadius: 2
            }] },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, max: 100, ticks: { color: '#666', font: { size: 8 } } },
                    x: { grid: { display: false }, ticks: { color: '#666', font: { size: 8 } } }
                }
            }
        });
    }

    function updateChart() {
        const daysInMonth = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        let labels = []; let scores = [];
        for(let i=1; i<=daysInMonth; i++) {
            labels.push(i);
            const habits = allData[`${selectedYear}_${selectedMonth}_${i}`] || [];
            const done = habits.filter(h => h.done).length;
            scores.push(habits.length ? Math.round((done/habits.length)*100) : 0);
        }
        myChart.data.labels = labels;
        myChart.data.datasets[0].data = scores;
        myChart.update();
    }

    function openExport() {
        document.getElementById('modalTitle').innerText = "CAPSULE STORAGE";
        document.getElementById('dataArea').value = btoa(JSON.stringify({ allData, notesData }));
        document.getElementById('modalBtn').innerText = "COPY DATA";
        document.getElementById('dataModal').style.display = 'flex';
    }
    function openRestore() {
        document.getElementById('modalTitle').innerText = "LOAD CAPSULE";
        document.getElementById('dataArea').value = "";
        document.getElementById('modalBtn').innerText = "RESTORE";
        document.getElementById('dataModal').style.display = 'flex';
    }
    function processData() {
        if(document.getElementById('modalBtn').innerText === "COPY DATA") {
            navigator.clipboard.writeText(document.getElementById('dataArea').value);
            alert("Data Capsule Saved!");
        } else {
            try {
                const data = JSON.parse(atob(document.getElementById('dataArea').value));
                allData = data.allData; notesData = data.notesData;
                updateUI(); closeModal();
            } catch(e) { alert("Invalid Capsule Data!"); }
        }
    }
    function closeModal() { document.getElementById('dataModal').style.display = 'none'; }
</script>
</body>
</html>
