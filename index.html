<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Habit Master Pro 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #F9FBFC; 
            --card: #FFFFFF;
            --primary: #B2AC88; 
            --text: #4A4A4A;
            --today-highlight: #FFF4E6; 
            --pastel-purple-low: rgba(179, 157, 219, 0.4); 
        }

        /* Color Palette for Habits */
        .habit-row-0 { --row-color: #E8F5E9; --text-color: #2E7D32; --accent-color: #81C784; } /* Green */
        .habit-row-1 { --row-color: #F1F3E9; --text-color: #556B2F; --accent-color: #A3AD85; } /* Sage */
        .habit-row-2 { --row-color: #E3F2FD; --text-color: #1565C0; --accent-color: #90CAF9; } /* Blue */
        .habit-row-3 { --row-color: #F3E5F5; --text-color: #6A1B9A; --accent-color: #CE93D8; } /* Purple */
        .habit-row-4 { --row-color: #FAF3E0; --text-color: #8D6E63; --accent-color: #D7CCC8; } /* Tan */

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; flex-grow: 1; width: 100%; box-sizing: border-box; }

        .card { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center;
        }

        .progress-card { background: white; padding: 25px 15px; border-radius: 24px; }
        .progress-title { font-size: 16px; font-weight: 700; color: #636E72; }
        .perc-val { font-size: 60px; font-weight: 800; color: #D1C4E9; line-height: 1.2; }
        .date-display { font-size: 14px; color: #B2BEC3; font-weight: 500; }

        .header-section { display: flex; justify-content: space-between; align-items: center; text-align: left; }
        h3 { margin: 0; color: var(--primary); font-size: 18px; letter-spacing: 0.5px; }

        select { 
            padding: 8px 12px; border-radius: 12px; border: 1px solid #EEE; 
            background: white; font-weight: 600; color: var(--text); outline: none;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: 320px 1fr; } }

        .chart-container { height: 240px; padding: 15px; background: white; border-radius: 24px; }

        .table-wrapper {
            width: 100%; overflow-x: auto; border-radius: 20px; 
            background: white; -webkit-overflow-scrolling: touch;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
        }

        table { border-collapse: collapse; min-width: 1000px; width: 100%; border-radius: 20px; }
        th { padding: 12px 5px; text-align: center; }
        
        .week-header { font-size: 11px; font-weight: 800; color: #8D6E63; background: #FFF4F0; text-transform: uppercase; }
        .day-label { font-size: 10px; color: #B2BEC3; border-bottom: 1px solid #F1F1F1; }
        .date-label { font-size: 12px; font-weight: 800; padding-bottom: 10px; }

        .habit-name-cell {
            position: sticky; left: 0; z-index: 10;
            min-width: 180px; text-align: left; padding: 15px 20px;
            font-weight: 700; border-right: 1px solid rgba(0,0,0,0.05);
            background-color: var(--row-color);
            color: var(--text-color);
            border-left: 5px solid var(--accent-color);
        }

        .day-cell { 
            padding: 10px 5px; 
            background-color: #FFF;
            transition: 0.2s;
        }

        /* The colored background for checked days */
        .day-cell.checked { background-color: var(--row-color); }

        .streak-badge {
            font-size: 9px; background: white; color: #FF7675;
            padding: 2px 6px; border-radius: 10px; margin-left: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .today-col { background-color: var(--today-highlight) !important; outline: 1px solid #FFE0B2; }

        input[type="checkbox"] { 
            width: 22px; height: 22px; 
            accent-color: var(--accent-color); 
            cursor: pointer; 
            border-radius: 6px;
        }

        .delete-btn { color: rgba(0,0,0,0.1); border: none; background: none; font-size: 16px; cursor: pointer; float: right; transition: 0.2s; }
        .delete-btn:hover { color: #FF7675; }

        .backup-controls { display: flex; justify-content: center; gap: 10px; margin-top: 10px; padding-bottom: 30px; }
        .btn-easy { 
            font-size: 11px; padding: 10px 15px; border-radius: 12px; border: 1px solid #EEE; 
            background: white; color: #95A5A6; font-weight: bold; cursor: pointer;
        }

        .developed-by {
            text-align: center; padding: 25px; color: var(--pastel-purple-low);
            font-weight: 800; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card header-section">
        <h3>Habit Master Pro 2026 🌿</h3>
        <select id="monthSelect" onchange="changeMonth()">
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
        </select>
    </div>

    <div class="stats-grid">
        <div class="card progress-card">
            <div class="progress-title">Today's Progress</div>
            <div class="perc-val" id="todayPercent">0%</div>
            <div class="date-display" id="fullDateDisplay">Loading...</div>
        </div>
        
        <div class="card chart-container">
            <canvas id="habitChart"></canvas>
        </div>
    </div>

    <div class="card" style="padding: 10px 15px;">
        <div style="display:flex; gap:10px;">
            <input type="text" id="habitInput" style="flex:1; padding:12px; border:1px solid #F1F1F1; border-radius:15px; outline:none;" placeholder="What's your goal today?">
            <button onclick="addHabit()" style="background:var(--primary); color:white; border:none; padding:0 20px; border-radius:15px; font-weight:bold; cursor:pointer;">+ Add</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr id="weekHeaderRow"></tr>
                <tr id="dayNameRow"></tr>
                <tr id="dateNumberRow"></tr>
            </thead>
            <tbody id="habitBody"></tbody>
        </table>
    </div>

    <div class="backup-controls">
        <button class="btn-easy" onclick="copyDataToClipboard()">💾 Export Data</button>
        <button class="btn-easy" onclick="pasteDataToRestore()">📂 Import Data</button>
    </div>

    <div class="developed-by">
        Developed by Pritam
    </div>
</div>

<script>
    let currentMonth = "";
    const monthsArr = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const dayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    let allData = JSON.parse(localStorage.getItem('HabitPro_Pritam_Final')) || {};
    let myChart;

    function init() {
        const d = new Date();
        currentMonth = monthsArr[d.getMonth()];
        document.getElementById('monthSelect').value = currentMonth;
        document.getElementById('fullDateDisplay').innerText = `${d.toDateString()}`;
        initChart();
        updateUI();
    }

    function initChart() {
        const ctx = document.getElementById('habitChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: [], datasets: [{ data: [], backgroundColor: '#D1C4E9', borderRadius: 10 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false },
                    x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#BDC3C7' } }
                }
            }
        });
    }

    function calculateStreak(days) {
        let streak = 0;
        const todayIdx = new Date().getDate() - 1;
        for (let i = todayIdx; i >= 0; i--) {
            if (days[i]) streak++;
            else if (i < todayIdx) break;
        }
        return streak;
    }

    function renderTable() {
        const body = document.getElementById('habitBody');
        body.innerHTML = '';
        const habits = allData[currentMonth] || [];
        const totalDays = getDaysInMonth();
        const today = new Date().getDate();
        const isCurrentMonth = (new Date().getMonth() === monthsArr.indexOf(currentMonth));

        habits.forEach((h, hIdx) => {
            const streak = calculateStreak(h.days);
            const colorClass = `habit-row-${hIdx % 5}`; // Cycle through the 5 colors
            
            let row = `<tr class="${colorClass}"><td class="habit-name-cell">
                        ${h.name} 
                        ${streak > 1 ? `<span class="streak-badge">🔥 ${streak}</span>` : ''}
                        <button class="delete-btn" onclick="deleteHabit(${hIdx})">×</button>
                      </td>`;
            
            for(let d=0; d<totalDays; d++) {
                const isToday = (isCurrentMonth && (d+1) === today) ? 'today-col' : '';
                const isChecked = h.days[d] ? 'checked' : '';
                row += `<td class="day-cell ${isToday} ${isChecked}">
                            <input type="checkbox" ${h.days[d]?'checked':''} onclick="toggleDay(${hIdx},${d})">
                        </td>`;
            }
            body.innerHTML += row + `</tr>`;
        });
    }

    function getDaysInMonth() { return new Date(2026, monthsArr.indexOf(currentMonth) + 1, 0).getDate(); }
    
    function updateUI() { 
        localStorage.setItem('HabitPro_Pritam_Final', JSON.stringify(allData)); 
        renderHeader(); 
        renderTable(); 
        calculateStats(); 
    }

    function renderHeader() {
        const totalDays = getDaysInMonth(); const mIdx = monthsArr.indexOf(currentMonth);
        let wk = `<th class="habit-name-cell" rowspan="3" style="background:white; color:#95A5A6; border-left:none;">HABITS</th>`, dy = '', dt = '';
        for (let d = 1; d <= totalDays; d++) {
            if ((d-1) % 7 === 0) wk += `<th colspan="${Math.min(7, totalDays-d+1)}" class="week-header">Week ${Math.floor((d-1)/7)+1}</th>`;
            const dateObj = new Date(2026, mIdx, d);
            dy += `<th class="day-label">${dayNames[dateObj.getDay()]}</th>`;
            dt += `<th class="date-label">${d}</th>`;
        }
        document.getElementById('weekHeaderRow').innerHTML = wk; document.getElementById('dayNameRow').innerHTML = dy; document.getElementById('dateNumberRow').innerHTML = dt;
    }

    function calculateStats() {
        const habits = allData[currentMonth] || []; const totalDays = getDaysInMonth();
        const todayIdx = new Date().getDate() - 1;
        const isCurrentMonth = (new Date().getMonth() === monthsArr.indexOf(currentMonth));
        let labels = [], scores = [], todayP = 0;
        for (let d = 0; d < totalDays; d++) {
            labels.push(d + 1); let done = 0;
            habits.forEach(h => { if(h.days[d]) done++; });
            let p = habits.length ? Math.round((done/habits.length)*100) : 0;
            scores.push(p); if(isCurrentMonth && d === todayIdx) todayP = p;
        }
        document.getElementById('todayPercent').innerText = todayP + "%";
        myChart.data.labels = labels; myChart.data.datasets[0].data = scores; myChart.update();
    }

    function addHabit() {
        const val = document.getElementById('habitInput').value.trim(); if(!val) return;
        if(!allData[currentMonth]) allData[currentMonth] = [];
        allData[currentMonth].push({ name: val, days: new Array(getDaysInMonth()).fill(false) });
        document.getElementById('habitInput').value = ''; updateUI();
    }

    function toggleDay(hIdx, dIdx) {
        allData[currentMonth][hIdx].days[dIdx] = !allData[currentMonth][hIdx].days[dIdx];
        if(allData[currentMonth][hIdx].days[dIdx]) confetti({ particleCount: 30, spread: 40, origin: { y: 0.8 } });
        updateUI();
    }

    function deleteHabit(idx) { if(confirm("Delete this habit?")) { allData[currentMonth].splice(idx, 1); updateUI(); } }
    function changeMonth() { currentMonth = document.getElementById('monthSelect').value; updateUI(); }

    function copyDataToClipboard() {
        const dataStr = JSON.stringify(allData);
        const el = document.createElement('textarea');
        el.value = dataStr;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("✅ Data Copied!");
    }

    function pasteDataToRestore() {
        const userInput = prompt("Paste code here:");
        if (userInput) {
            try {
                allData = JSON.parse(userInput);
                updateUI();
                alert("🔥 Success!");
            } catch (e) { alert("❌ Error!"); }
        }
    }

    window.onload = init;
</script>
</body>
</html>
